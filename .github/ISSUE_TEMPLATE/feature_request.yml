name: Feature request
description: Suggest an idea or improvement
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem / motivation
      description: What problem does this solve? What are you trying to do?
      placeholder: I'm always frustrated when ...
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Describe the feature or change you'd like to see.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Any alternative solutions or workarounds you've thought about.
    validations:
      required: false
  - type: dropdown
    id: target
    attributes:
      label: Relevant target(s)
      description: Which target(s) would this affect?
      multiple: true
      options:
        - Android
        - JVM (desktop)
        - JS
        - wasmJs (web)
        - iOS
        - All / cross-platform
    validations:
      required: false
  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Mockups, references (e.g. how Figma does it), or links.
    validations:
      required: false
