name: Bug report
description: Report a problem with Mission Visualization
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug report. Please fill in as much as you can.
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear and concise description of the bug.
      placeholder: When I ..., the editor ...
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Steps to reproduce
      description: Minimal steps (or a `*.layout.md` snippet) that reproduce the problem.
      placeholder: |
        1. Open ...
        2. Click ...
        3. See error
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected vs actual behavior
      description: What did you expect to happen, and what happened instead?
    validations:
      required: true
  - type: dropdown
    id: target
    attributes:
      label: Target / platform
      description: Which target did you observe this on?
      multiple: true
      options:
        - Android
        - JVM (desktop)
        - JS
        - wasmJs (web)
        - iOS
    validations:
      required: true
  - type: input
    id: environment
    attributes:
      label: Environment
      description: OS, browser (for web), JDK version, and commit/version if known.
      placeholder: macOS 15, Chrome 140, JDK 17, v0.1.42
    validations:
      required: false
  - type: textarea
    id: logs
    attributes:
      label: Logs / screenshots
      description: Console output, stack traces, or screenshots. (Code blocks are rendered.)
    validations:
      required: false
