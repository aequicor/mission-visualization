name: Deploy Web Wasm to GitHub Pages

on:
  push:
    branches:
      - main
    paths-ignore:
      - README.md
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    name: Build and Deploy Web Wasm
    runs-on: ubuntu-24.04
    permissions:
      contents: write
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up JDK
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Build optimized Web Wasm distribution
        run: ./gradlew :webApp:packWasmDist -PmvAppVersion=0.1.${{ github.run_number }}

      - name: Disable Jekyll processing
        run: touch webApp/build/dist/wasmJs/productionExecutable/.nojekyll

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v6

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: webApp/build/dist/wasmJs/productionExecutable
          include-hidden-files: true

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5

      - name: Update published version in README
        env:
          VERSION: 0.1.${{ github.run_number }}
        run: |
          sed -i "/<!-- published-version -->/c\\**Latest published web version: v${VERSION}.** <!-- published-version -->" README.md
          if git diff --quiet -- README.md; then
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md
          git commit -m "docs: update published version to v${VERSION} [skip ci]"
          git push
