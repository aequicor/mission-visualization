version: 1
title: Mission Control Onboarding
description: Standalone example document for the IR-based visualization engine.
theme:
  name: Lazurite
  primary: "#1F5FA8"
  accent: "#2BB8A8"
  surface: "#F6FAFF"
  mood: precise, calm, product-focused
screens:
  - id: dashboard
    title: Mission Dashboard
    layout:
      type: column
      padding: lg
      gap: md
    children:
      - id: dashboard-topbar
        type: topBar
        props:
          title: Mission Visualization
          text: Review AI-authored screens without Figma
      - id: dashboard-summary
        type: section
        props:
          title: Active Scenario
          body: High-level mission state and next action.
        children:
          - id: readiness-card
            type: card
            props:
              title: Launch readiness
              body: 78% mapped
          - id: review-button
            type: button
            style:
              variant: primary
            props:
              text: Review scenario
            action:
              type: navigate
              target: prompt-review
  - id: prompt-review
    title: Prompt Review
    layout:
      type: column
      padding: lg
      gap: md
    children:
      - id: prompt-tabs
        type: tabs
        props:
          title: Prompt workspace
          items:
            - Design patch
            - Component notes
            - Scenario context
      - id: prompt-card
        type: card
        props:
          title: Generated design prompt
          body: Make the primary action clearer while preserving the lazurite tone.
scenarios:
  - id: review-flow
    title: Review a generated screen
    steps:
      - id: open-dashboard
        screenId: dashboard
        nodeId: dashboard-summary
        action: Open the dashboard and inspect the active scenario summary.
      - id: generate-prompt
        screenId: prompt-review
        nodeId: prompt-card
        action: Generate a prompt for the selected design target.
comments:
  - id: comment-review-button-seed
    targetId: review-button
    author: agent
    body: The primary CTA should feel decisive without becoming visually heavy.
